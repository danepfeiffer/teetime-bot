name: Check Tee Times
on: {schedule: [{cron: "*/5 * * * *"}], workflow_dispatch: {}}
jobs: {check: {runs-on: ubuntu-latest, steps: [{uses: "actions/checkout@v4"}, {uses: "actions/setup-python@v5", with: {python-version: "3.12"}}, {name: "Install dependencies", run: "pip install requests"}, {name: "Run check", env: {GMAIL_USER: "${{ secrets.GMAIL_USER }}", GMAIL_APP_PASSWORD: "${{ secrets.GMAIL_APP_PASSWORD }}", PHONE_GATEWAY: "${{ secrets.PHONE_GATEWAY }}"}, run: "python check_tee_times.py"}]}}
